body:
  text: 大唐天竺三藏地婆訶羅譯如是我聞一時薄伽梵在日月宮中勝藏殿上與大比丘衆九十百千俱胝及無量菩薩摩訶薩俱爾時佛告勝積菩薩北方去此六十恆河沙佛土俱胝那由他百千微塵等剎有世界名曰歡樂佛號法起如來應正等覺現在説法以立持安普利一切今欲説大方廣名師子吼難遇難聞汝可詣彼聽受法要爾時勝積菩薩受佛教已即往歡樂世界見法起佛頂禮雙足右繞七匝却住一面時法起佛見勝積菩薩知而故問作如是言善男子汝從何來時勝積菩薩居心而住默無言説天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等普大會衆咸作是念勝積菩薩三界尊問如何默然不答居心而住爾時佛以修廣明朗青蓮華目師子頻申普視十方知大衆疑便現微笑放大金光其光間錯無量百千種種異色普照十方一切國土地大震動是時十方諸菩薩衆見此神變種種形色種種儀服來詣佛所頂禮佛足各以己福莊嚴華藏坐蓮華座爾時電鬘菩薩從座而起偏袒右肩右膝著地合掌向佛歡喜奇特得未曾有白佛言世尊我昔曾見無量神變未有光明地震如今所覩善哉世尊願説因緣何故微笑惟垂悲愍決此衆疑爾時電鬘菩薩以偈請曰大悲大導師微笑非無因願佛利衆生垂哀決定説爾時法起如來端嚴赫奕閻浮檀金暉煥照朗散注無量百千俱胝那由他微妙光明如大金柱電鬘菩薩白佛言世尊我見無量神通光明未若今日昔所不覩佛告電鬘如是如是此大光明神通如來希現非大因緣不示此相諦聽諦聽善思念之當為汝説微笑因緣汝勿驚怖勿餘悕望堅固汝心勿生疑惑所以者何諸佛境界不可思議願力神通不可思議汝深思此慎無疑惑電鬘汝見勝積菩薩釋迦牟尼佛使來者不電鬘言見善男子此勝積菩薩我問汝從何來居心默然而不答我我見此事故現微笑如來問而不答今此會衆咸生疑怪善男子勝積菩薩作如是解一切諸法無來無去云何世尊而問我言汝從何來彼知諸法無有言説處不可得云何而得言所從來善男子此已略説諸法實相善男子勝積菩薩於一切法中無字無説字性離故諸法無出出性離故諸法無趣趣正斷故諸法無現無所依故超心意識離諸因緣無名無言無作無示過眼等路無所積聚無生離想無有處所離諸處所法惟一字所謂無字本無言説何所言説善男子當知無説是為真説爾時淨身菩薩承佛神力白佛言世尊若無所説是真説者啞默不言皆應説法佛言如是善男子如汝所言非惟啞默説法不啞默者亦皆説法而不知法淨身菩薩白佛言世尊惟願顯説云何一切衆生説法而不知法佛告淨身菩薩善男子如生盲人處日光中而不見日傍人為説以他聲故乃知有日如是諸法悉入法界法界無字離諸字性非諸衆生所能宣辨以因緣故而有言説如幽谷響谷空無聲以因緣故有響聲起如是善男子因緣和合字聲顯現而衆生界空無有字善男子衆生所有音聲語言當知皆入四無礙智以言説者斯入法無礙智非言説者斯入義無礙智以言分剖斯入辭無礙智與事相應決了無滯斯入善説無礙智衆生所有言説當知皆悉入此四法句中真實義句本來不動如彼生盲隨他言執非真實見是故善男子欲求法者於自身求欲求菩提以五蘊求説此實義句時三千大千世界普六震動大光遍照佛出廣長舌相遍覆三千大千世界從其舌相放無量俱胝那由他百千光明從大地獄上至有頂一切世界光明遍照還攝舌相普告大會汝等當知如來廣長舌相由實語得如來所説應當敬受起真實信勿懷猶豫而生疑惑爾時十地菩薩等衆并天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等一切大會俱從座起合掌同聲而白佛言惟願世尊説如實義惟願善逝説如實義我等今者惟悕如來所證之法不悕餘法我等大衆咸無疑惑爾時世尊再三觀覽一切大會作如是言我為悲愍一切世間利益安樂多衆生故以法財利安諸天人是以今説大師子吼善男子汝等當知娑婆世界釋迦牟尼如來應正等覺現在説法以立持安度衆生者彼即是我法起如來我於娑婆世界作種種形饒益衆生隨其所宜如應度脫是時大會聞説此語咸生奇特歡喜踊躍得未曾有同聲唱言善哉善哉世尊欲令一切衆生吼師子吼故為大會説師子吼真實之法若得聞者當知是人善根不少況復受持讀誦廣宣流布種種花鬘種種衣物幢幡幰蓋燒塗末香恭敬供養斯人則為一切諸佛之所眷護爾時佛讚諸菩薩言善哉善哉善男子如汝所言是善男子善女人等功德不少此佛真實師子吼法若聞淨心乃至一稱善哉者我皆攝護亦為彌勒之所顧召斯人兩肩擔我菩提於五濁中信受此經生生之處我當成熟亦為彌勒之所攝護此人當能乾竭生死海降伏衆魔銷諸煩惱擊大法鼓永離女身摧諸怨障息衆結聚若有善男子善女人經十阿僧祇三千大千世界微塵等劫以一切樂具供養供給一切如來若聞此經真實神通懷疑不信斯人則於佛所有過不名真實供養諸佛若有善男子聞説如來此真實德淨信稱歎比前功德過百千倍斯人則為真實供養善男子汝等若於我所心淨信者當好書寫受持此經此經所在之處諸佛遊止爾時勝積菩薩電鬘菩薩常光菩薩淨眼菩薩彌勒菩薩作無畏菩薩觀自在菩薩大勢至菩薩文殊師利菩薩辨積菩薩辨勇菩薩除一切障菩薩作光菩薩普賢菩薩如是上首八十四俱胝那由他百千菩薩摩訶薩俱白佛言世尊我等於後末時當廣流布如是經典令諸衆生悟大涅槃世尊若不久植善根如是之經不入其耳若有受持此經廣流布者歎其功德於百千俱胝那由他劫不可窮盡爾時世尊告諸菩薩言善哉善哉汝等應當如是尊重佛教受持正法佛説此經已勝積菩薩并諸天人阿修羅乾闥婆等普大會衆歡喜奉行
